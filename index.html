<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#17172a" />
  <title>GAA World Games</title>

  <!-- Google Fonts: Poppins (headings) + Inter (body). styles.css also @imports these,
       but preconnect + explicit link speeds first paint. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css?v=17" />
  <link rel="stylesheet" href="css/calendar.css?v=17" />
  <link rel="stylesheet" href="css/players.css?v=17" />
  <style>
    /* accessible-hidden helper for form labels */
    .wg-visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;
      overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
    /* Cup Final scouting banner (links to final.html) */
    .wg-finalbar{display:flex;align-items:center;gap:10px;justify-content:center;
      max-width:680px;margin:0 auto;padding:10px 16px;text-decoration:none;
      background:#fff;border:1px solid var(--wg-line,#e2e2ec);border-bottom:none;
      color:var(--wg-text,#1c1c28);font-weight:600;font-size:13.5px}
    .wg-finalbar:hover{background:var(--wg-surface-2,#f0f0f5)}
    .wg-finalbar .tag{font:700 10px/1 'Poppins',sans-serif;letter-spacing:.06em;
      text-transform:uppercase;color:#fff;background:var(--wg-crimson,#E40048);
      padding:4px 8px;border-radius:6px}
    .wg-finalbar .arrow{margin-left:2px;color:var(--wg-text-faint,#9494a6);font-weight:700}
  </style>
</head>
<body>

  <!-- Dark masthead: logo (has white elements, needs dark bg) + titles -->
  <header class="wg-masthead">
    <div class="wg-masthead__row">
      <img class="wg-masthead__logo" src="World_Games_Logo.png" alt="GAA World Games logo" />
      <div class="wg-masthead__titles">
        <h1 class="wg-title">GAA World Games 2026</h1>
        <div class="wg-subtitle" id="wg-divname">International Camogie Division 1</div>
      </div>
    </div>

    <div class="wg-divselect-wrap">
      <label class="wg-visually-hidden" for="wg-divselect">Choose division</label>
      <select class="wg-divselect" id="wg-divselect"></select>
    </div>
  </header>

  <!-- 4-color brand rule, directly under the masthead -->
  <div class="wg-rule"></div>

  <!-- Link to the Cup Final scouting report -->
  <a class="wg-finalbar" href="final.html">
    <span class="tag">Cup Final</span>
    Scouting Report — Southeast vs New York
    <span class="arrow">→</span>
  </a>

  <!-- View toggle / tab bar (Bracket | Calendar). Fixed bottom on phones. -->
  <nav class="wg-tabbar" id="wg-tabbar" aria-label="Views">
    <button class="wg-tab" data-view="bracket" type="button">
      <svg class="wg-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 5h5v5H4z"/><path d="M4 14h5v5H4z"/><path d="M15 9h5v6h-5z"/>
        <path d="M9 7h3v10h3"/>
      </svg>
      Bracket
    </button>
    <button class="wg-tab" data-view="calendar" type="button">
      <svg class="wg-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/>
        <path d="M8 2v4"/><path d="M16 2v4"/>
      </svg>
      Calendar
    </button>
    <button class="wg-tab" data-view="players" type="button">
      <svg class="wg-tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/>
      </svg>
      Players
    </button>
  </nav>

  <main class="wg-main">
    <section class="wg-view" id="wg-view-bracket" role="tabpanel" aria-label="Bracket"></section>
    <section class="wg-view" id="wg-view-calendar" role="tabpanel" aria-label="Calendar"></section>
    <section class="wg-view" id="wg-view-players" role="tabpanel" aria-label="Players"></section>
    <div id="wg-root" hidden></div>
  </main>

  <footer class="wg-footer" id="wg-footer" aria-live="polite"></footer>

  <!-- Modules IN DEPENDENCY ORDER -->
  <script src="js/data.js?v=17"></script>
  <script src="js/standings.js?v=17"></script>
  <script src="js/scenarios.js?v=17"></script>
  <script src="js/predictions.js?v=17"></script>
  <script src="js/forecast.js?v=17"></script>
  <script src="js/bracket.js?v=17"></script>
  <script src="js/calendar.js?v=17"></script>
  <script src="js/players.js?v=17"></script>
  <script src="js/app.js?v=17"></script>
</body>
</html>
